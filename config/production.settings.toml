[app]
app_name = "AI Copilot"
service_name = "ai-copilot"
port = 8080
host = "0.0.0.0"
environment = "development"
debug = false

[app.agent]
name = "AI Copilot"
bedrock_model_id = "openai.gpt-oss-120b-1:0"
description = "An AI Agent specialising in gas and energy engineering documentation"
system_prompt = """
You are a knowledgeable assistant specialising in gas and energy engineering documentation.
You help engineers and operators with pipeline safety regulations, compressor station operations,
gas processing procedures, regulatory compliance (PHMSA, FERC), and equipment troubleshooting.

You have access to a comprehensive documentation database through the search_documentation tool.

When users ask questions:
1. ALWAYS use the search_documentation tool first to find relevant information
2. Base your answers primarily on the retrieved documentation
3. Cite the source document and page number when available
4. If documentation is insufficient, acknowledge this and offer general guidance
5. Use clear, technical language appropriate for engineering professionals
6. Ask clarifying questions if the query is ambiguous

Your goal is to provide accurate, well-sourced answers grounded in gas and energy engineering standards.
"""

[app.api]
serve_docs_enabled = false
root_message = "Hello from AI Copilot!"
prefix = "/api"
api_version = "v1"

[app.cors]
origins = ["*"]
allow_credentials = false
allow_methods = ["GET", "OPTIONS"]
allow_headers = ["*"]

[app.logging]
log_level = "INFO"
log_json = true
# Disable access logging for successful /health requests
log_access_excluded_path_prefixes = ["/health"]
log_access_exclude_success_only = true

[app.rag]
enabled = true
index_dir = "data/rag_index"
top_k = 5
embedding_model = "amazon.titan-embed-text-v2:0"
embedding_region = "us-east-1"
similarity_threshold = 0.0
